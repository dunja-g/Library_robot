<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" width="520" height="180">
  <!-- NUS Shield Base -->
  <g transform="translate(10, 10)">
    <path d="M 0 0 L 140 0 C 140 0 140 100 140 105 C 140 145 70 170 70 170 C 70 170 0 145 0 105 Z" fill="#003D7C"/>
    <!-- Horizontal & Vertical Dividing Line in Upper Shield -->
    <path d="M 0 65 L 140 65 M 70 0 L 70 65" stroke="#FFFFFF" stroke-width="2.5"/>
    
    <!-- Top-Left: Open Book with Orange Border -->
    <g transform="translate(12, 12)">
      <rect x="0" y="0" width="46" height="40" fill="#EF7C00" rx="3"/>
      <path d="M 4 5 Q 23 2 42 5 V 35 Q 23 32 4 35 Z" fill="#FFFFFF"/>
      <path d="M 23 3 V 33" stroke="#EF7C00" stroke-width="1.5"/>
      <!-- Book Text Lines -->
      <line x1="8" y1="11" x2="19" y2="11" stroke="#003D7C" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="8" y1="17" x2="19" y2="17" stroke="#003D7C" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="8" y1="23" x2="19" y2="23" stroke="#003D7C" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="27" y1="11" x2="38" y2="11" stroke="#003D7C" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="27" y1="17" x2="38" y2="17" stroke="#003D7C" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="27" y1="23" x2="38" y2="23" stroke="#003D7C" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- Top-Right: 3 Interlocking Orange Rings -->
    <g transform="translate(82, 12)">
      <circle cx="14" cy="14" r="10" fill="none" stroke="#EF7C00" stroke-width="3.5"/>
      <circle cx="28" cy="14" r="10" fill="none" stroke="#EF7C00" stroke-width="3.5"/>
      <circle cx="21" cy="25" r="10" fill="none" stroke="#EF7C00" stroke-width="3.5"/>
    </g>

    <!-- Bottom: NUS Golden Lion -->
    <g transform="translate(15, 74)">
      <!-- Lion Body & Tail -->
      <path d="M 25 35 C 20 20 35 15 50 15 C 65 15 80 20 90 28 C 95 24 100 12 105 10 C 102 18 98 25 94 30 C 98 40 92 50 85 55 C 80 58 70 60 55 60 C 40 60 30 55 25 35 Z" fill="#EF7C00"/>
      <!-- Legs -->
      <path d="M 28 45 L 20 68 H 28 L 34 52 M 45 48 L 40 68 H 48 L 52 52 M 72 48 L 78 68 H 86 L 80 50 M 88 42 L 95 65 H 103 L 96 42" stroke="#EF7C00" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Head & Mane -->
      <path d="M 20 22 C 10 15 5 28 12 38 C 18 45 28 40 28 30 Z" fill="#EF7C00"/>
      <circle cx="16" cy="24" r="2.5" fill="#FFFFFF"/>
      <!-- Crown / Details -->
      <path d="M 12 16 L 16 10 L 20 16 Z" fill="#EF7C00"/>
    </g>
  </g>

  <!-- Large NUS Text -->
  <text x="175" y="92" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="800" font-size="82" fill="#003D7C" letter-spacing="-1.5">NUS</text>
  <!-- Subtitle Text -->
  <text x="178" y="128" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="600" font-size="22" fill="#003D7C" letter-spacing="-0.2">National University of Singapore</text>
</svg>
